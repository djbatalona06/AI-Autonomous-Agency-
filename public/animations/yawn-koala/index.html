      <!-- ═══════════════════════════════════════════════════════════
           ANIMATION — single paused GSAP timeline
           ═══════════════════════════════════════════════════════════ -->
      <script>
        (function () {
          var tl = gsap.timeline({ paused: true });

          // ── Deterministic burst directions (20 particles × 18°) ──
          var bptcls = document.querySelectorAll('#yk-burst .bptcl');
          var burstDirs = [];
          for (var bi = 0; bi < 20; bi++) {
            var rad = bi * 18 * Math.PI / 180;
            burstDirs.push({ dx: Math.cos(rad) * 340, dy: Math.sin(rad) * 340 });
          }

          // ── Task data: [selector, startX, startY, endX*, endY*] ──
          // *endX/Y are GSAP x/y offsets FROM the CSS-defined cluster position (→ always 0,0)
          // startX/Y are offsets from cluster position to the off-screen start
          var tasks = [
            ['.t-email',  -820,   -10],
            ['.t-cal',    1190,  -170],
            ['.t-sheet',  -760,    80],
            ['.t-clock',  1040,   110],
            ['.t-bell',    180,  -440],
            ['.t-folder',  920,  -250],
            ['.t-chat',   -680,   120],
            ['.t-cursor',  200,   650],
            ['.t-clip',    980,   -80],
          ];
          var explodeVecs = [
            { dx: -420, dy: -310 },
            { dx:  310, dy: -380 },
            { dx: -370, dy:  210 },
            { dx:  380, dy: -195 },
            { dx: -215, dy: -430 },
            { dx:  440, dy:  160 },
            { dx: -320, dy:  360 },
            { dx:   90, dy:  430 },
            { dx:  360, dy: -195 },
          ];

          // ════════════════════════════════════════════════════
          // INITIAL STATE
          // ════════════════════════════════════════════════════
          tl.set('#yk-koala-group', { y: 1380, scale: 0.04, opacity: 1 }, 0);
          tl.set('#yk-arm-l', { rotation: -25 }, 0);
          tl.set('#yk-arm-r', { rotation: 22 }, 0);
          tl.set('#yk-wand', { opacity: 0, y: -460 }, 0);
          tl.set('#yk-bg-glow', { opacity: 0 }, 0);
          tl.set('#yk-bg-tint', { opacity: 0 }, 0);
          tl.set('#yk-city', { opacity: 0 }, 0);
          tl.set('#yk-ghost', { opacity: 0, y: 0, xPercent: -50, yPercent: -50 }, 0);
          tl.set('#yk-wordmark-layer', { opacity: 1 }, 0);
          tl.set('#yk-wordmark', { opacity: 0, y: 55, scale: 0.86 }, 0);
          tl.set('#yk-tagline', { opacity: 0, y: 22 }, 0);
          tl.set('#yk-n8n-credit', { opacity: 0, y: 12 }, 0);
          tl.set('#yk-wave', { opacity: 0, scale: 0 }, 0);
          tl.set('#yk-flash', { opacity: 0 }, 0);
          tl.set('.task', { x: 0, y: 0, opacity: 0, scale: 0.3, rotation: 0 }, 0);
          tl.set('.bptcl', { x: 0, y: 0, opacity: 0 }, 0);
          tl.set('.ptcl', { opacity: 0, y: 0 }, 0);

          // Set task starting offsets
          tasks.forEach(function (d) {
            tl.set(d[0], { x: d[1], y: d[2] }, 0);
          });

          // ════════════════════════════════════════════════════
          // ACT 1 — AWAKENING  (0 – 5s)
          // ════════════════════════════════════════════════════

          // Subtle ground tremble at t=0.8 (x jitter, 8 repeats)
          tl.to('#yk-bg', { x: 5, duration: 0.07, yoyo: true, repeat: 7, ease: 'none' }, 0.8);
          tl.set('#yk-bg', { x: 0 }, 1.42);

          // Ghost "YAWN" text breathes in slowly
          tl.fromTo(
            '#yk-ghost',
            { opacity: 0, y: 0, xPercent: -50, yPercent: -50 },
            { opacity: 0.034, y: -20, xPercent: -50, yPercent: -50, duration: 6, ease: 'sine.inOut' },
            1.0
          );

          // City silhouette rises out of darkness
          tl.fromTo(
            '#yk-city',
            { opacity: 0, y: 38 },
            { opacity: 0.28, y: 0, duration: 2.6, ease: 'power2.out' },
            3.2
          );

          // Ambient particles float upward (staggered)
          var ptcls = document.querySelectorAll('#yk-particles .ptcl');
          ptcls.forEach(function (p, i) {
            tl.fromTo(
              p,
              { opacity: 0, y: 0 },
              { opacity: 0.48, y: -(190 + i * 18), duration: 4.2 + i * 0.18, ease: 'power1.out' },
              1.9 + i * 0.11
            );
          });

          // ════════════════════════════════════════════════════
          // ACT 2 — THE REVEAL  (5 – 9.5s)
          // ════════════════════════════════════════════════════

          // Koala rises from below: massive scale surge, overshoot via ease
          tl.fromTo(
            '#yk-koala-group',
            { y: 1380, scale: 0.04 },
            { y: 0, scale: 1.0, duration: 4.2, ease: 'back.out(1.15)' },
            5.0
          );

          // Background glow blooms beneath rising koala
          tl.fromTo(
            '#yk-bg-glow',
            { opacity: 0, scale: 0 },
            { opacity: 1, scale: 1, duration: 2.8, ease: 'power2.out' },
            5.6
          );

          // Eye flash as koala lands
          tl.to(
            '#yk-eye-l, #yk-eye-r',
            {
              boxShadow: '0 0 45px rgba(255,217,102,1), 0 0 90px rgba(255,200,50,0.85)',
              duration: 0.35,
              ease: 'power3.out'
            },
            7.8
          );
          tl.to(
            '#yk-eye-l, #yk-eye-r',
            {
              boxShadow: '0 0 22px rgba(255,217,102,0.7), 0 0 45px rgba(255,200,50,0.35)',
              duration: 0.9,
              ease: 'power2.out'
            },
            8.2
          );

          // Screen impact flash
          tl.to('#yk-flash', { opacity: 0.2, duration: 0.07 }, 7.7);
          tl.to('#yk-flash', { opacity: 0, duration: 0.38, ease: 'power2.out' }, 7.78);

          // Koala breathing — seekable (24 plays × 1s each, t=9.5 to t=33.5)
          tl.to(
            '#yk-koala-group',
            { y: -12, duration: 1, ease: 'sine.inOut', repeat: 23, yoyo: true },
            9.5
          );

          // ════════════════════════════════════════════════════
          // ACT 3 — THE WAND  (8.5 – 12s)
          // ════════════════════════════════════════════════════

          // n8n wand plummets from above
          tl.fromTo(
            '#yk-wand',
            { opacity: 1, y: -460, rotation: -28 },
            { opacity: 1, y: 0, rotation: 0, duration: 1.6, ease: 'bounce.out' },
            8.5
          );

          // Right arm raises to meet the wand
          tl.to(
            '#yk-arm-r',
            { rotation: 132, duration: 1.0, ease: 'back.out(1.6)' },
            9.7
          );

          // Wand glow blooms on "catch"
          tl.fromTo(
            '#yk-wand-glow',
            { scale: 0, opacity: 0 },
            { scale: 2.2, opacity: 1, duration: 0.65, ease: 'power2.out' },
            10.3
          );
          tl.to(
            '#yk-wand-glow',
            { scale: 1.5, opacity: 0.62, duration: 0.6, ease: 'power2.out', overwrite: 'auto' },
            10.95
          );

          // Wand badge ambient pulse — seekable (54 plays × 0.4s, t=10.8 to t=32.4)
          tl.to(
            '#yk-wand-badge',
            {
              boxShadow: '0 0 40px rgba(234,88,12,1), 0 0 90px rgba(234,88,12,0.65)',
              scale: 1.07,
              duration: 0.4,
              ease: 'sine.inOut',
              repeat: 53,
              yoyo: true
            },
            10.8
          );

          // ════════════════════════════════════════════════════
          // ACT 4 — THE SWARM  (12 – 17s)
          // ════════════════════════════════════════════════════

          // Task icons converge from off-screen edges
          tasks.forEach(function (d, i) {
            tl.fromTo(
              d[0],
              { x: d[1], y: d[2], opacity: 0, scale: 0.3, rotation: (i % 2 === 0 ? 18 : -18) },
              {
                x: 0, y: 0, opacity: 1, scale: 1, rotation: 0,
                duration: 2.1, ease: 'power2.in'
              },
              12.0 + i * 0.3
            );
          });

          // Ominous red tint creeps in
          tl.fromTo(
            '#yk-bg-tint',
            { opacity: 0 },
            { opacity: 1, duration: 2.2, ease: 'sine.inOut' },
            14.2
          );

          // Tasks wobble menacingly (approach tremor)
          tl.to(
            '.task',
            { y: -14, duration: 0.38, ease: 'sine.inOut', repeat: 5, yoyo: true },
            15.8
          );

          // ════════════════════════════════════════════════════
          // ACT 5 — THE PURGE  (17 – 20s)
          // ════════════════════════════════════════════════════

          // Arm winds up then sweeps
          tl.to('#yk-arm-r', { rotation: 158, duration: 0.18, ease: 'power4.out' }, 17.0);
          tl.to('#yk-arm-r', { rotation: 52, duration: 0.55, ease: 'power3.in' }, 17.2);
          tl.to('#yk-arm-r', { rotation: 125, duration: 0.85, ease: 'elastic.out(1, 0.4)' }, 17.8);

          // Wand badge mega-burst then settles (overwrite: auto to clear the pulse repeat)
          tl.to(
            '#yk-wand-badge',
            { boxShadow: '0 0 90px rgba(234,88,12,1), 0 0 200px rgba(234,88,12,0.95)', scale: 1.18, duration: 0.14, overwrite: 'auto' },
            17.0
          );
          tl.to(
            '#yk-wand-badge',
            { boxShadow: '0 0 24px rgba(234,88,12,0.8), 0 0 60px rgba(234,88,12,0.35)', scale: 1, duration: 0.7, overwrite: 'auto' },
            17.2
          );

          // Wand glow nova
          tl.to('#yk-wand-glow', { scale: 9, opacity: 0, duration: 0.55, ease: 'expo.out' }, 17.1);

          // Energy wave radiates outward — transform-origin on SVG circle
          tl.fromTo(
            '#yk-wave',
            { opacity: 0.88, scale: 0 },
            { opacity: 0, scale: 6.5, duration: 1.9, ease: 'power1.out', transformOrigin: '878px 338px' },
            17.18
          );

          // Screen flash
          tl.to('#yk-flash', { opacity: 0.48, duration: 0.09 }, 17.12);
          tl.to('#yk-flash', { opacity: 0, duration: 0.45, ease: 'power2.out' }, 17.22);

          // Tasks scatter and dissolve (overwrite: auto to cut the wobble repeat)
          tasks.forEach(function (d, i) {
            var ev = explodeVecs[i];
            tl.to(
              d[0],
              {
                x: ev.dx, y: ev.dy,
                opacity: 0, scale: 0.12,
                rotation: (i % 2 === 0 ? 1 : -1) * (130 + i * 14),
                duration: 0.72, ease: 'power3.in',
                overwrite: 'auto'
              },
              17.28 + i * 0.04
            );
          });

          // Orange burst particles from wand tip
          bptcls.forEach(function (p, i) {
            var bd = burstDirs[i];
            tl.fromTo(
              p,
              { x: 0, y: 0, opacity: 0.92 },
              { x: bd.dx, y: bd.dy, opacity: 0, duration: 0.95, ease: 'power2.out' },
              17.22 + i * 0.014
            );
          });

          // Red tint clears away
          tl.to('#yk-bg-tint', { opacity: 0, duration: 1.3, ease: 'power2.out' }, 17.6);

          // ════════════════════════════════════════════════════
          // ACT 6 — VICTORY  (20 – 32s)
          // ════════════════════════════════════════════════════

          // Satisfied blink
          tl.to('#yk-eye-l, #yk-eye-r', { scaleY: 0.1, duration: 0.1, ease: 'power2.in' }, 20.0);
          tl.to('#yk-eye-l, #yk-eye-r', { scaleY: 1, duration: 0.22, ease: 'power3.out' }, 20.2);
          tl.to(
            '#yk-eye-l, #yk-eye-r',
            { boxShadow: '0 0 38px rgba(255,217,102,0.9), 0 0 75px rgba(255,200,50,0.55)', duration: 0.6 },
            20.22
          );
          tl.to(
            '#yk-eye-l, #yk-eye-r',
            { boxShadow: '0 0 22px rgba(255,217,102,0.7), 0 0 45px rgba(255,200,50,0.35)', duration: 1.2, ease: 'power2.out' },
            20.85
          );

          // "YAWN." wordmark assembles with cinematic authority
          tl.to(
            '#yk-wordmark',
            { opacity: 1, y: 0, scale: 1, duration: 1.7, ease: 'expo.out' },
            20.6
          );

          // Tagline drifts up into view
          tl.to(
            '#yk-tagline',
            { opacity: 1, y: 0, duration: 1.3, ease: 'power2.out' },
            22.2
          );

          // n8n credit badge
          tl.to(
            '#yk-n8n-credit',
            { opacity: 1, y: 0, duration: 0.9, ease: 'power2.out' },
            23.8
          );

          // Ghost text intensifies slightly into victory
          tl.to('#yk-ghost', { opacity: 0.055, xPercent: -50, yPercent: -50, duration: 3.5, ease: 'sine.inOut' }, 22.0);

          // Ambient glow breathes in victory (6 cycles × 1.5s, t=22 to t=31)
          tl.to(
            '#yk-bg-glow',
            { opacity: 0.72, scale: 1.06, duration: 1.5, ease: 'sine.inOut', repeat: 5, yoyo: true },
            22.0
          );

          // ════════════════════════════════════════════════════
          // Register
          // ════════════════════════════════════════════════════
          window.__timelines = window.__timelines || {};
          window.__timelines['yawn-kaiju-koala'] = tl;
        })();
      </script>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
    </script>
  </body>
