name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  # Lets the action post the review summary on the PR.
  pull-requests: write

jobs:
  # Blocking gate: fail the PR on newly introduced high-severity (or worse)
  # vulnerabilities in dependency changes.
  vulnerabilities:
    name: Vulnerability Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review (vulnerabilities)
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # Advisory gate: surface GPL-family copyleft licenses as a warning only, so a
  # license hit does not hard-block the PR.
  licenses:
    name: License Advisory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review (licenses)
        uses: actions/dependency-review-action@v4
        with:
          deny-licenses: GPL-2.0, GPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0, AGPL-1.0, AGPL-3.0
          warn-only: true
