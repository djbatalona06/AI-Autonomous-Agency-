name: Secret Scan

on:
  push:
  pull_request:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so gitleaks can scan every commit, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point at the repo-local ruleset (allows .env.example placeholders,
          # flags real secrets such as a committed .env).
          GITLEAKS_CONFIG: .gitleaks.toml
          # Org/enterprise license key for gitleaks-action, when configured.
          # Optional for public repos; harmless when unset.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
